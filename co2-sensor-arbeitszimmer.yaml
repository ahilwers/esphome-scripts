esphome:
  name: co2-sensor-arbeitszimmer
  friendly_name: CO2-Sensor-Arbeitszimmer

esp8266:
  board: esp01_1m

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret co2_encryption_key
  services:
    - service: mhz19_calibrate_zero
      then:
        - mhz19.calibrate_zero: mhz19_arbeitszimmer  

ota:
  - platform: esphome
    password: !secret co2_esphome_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Co2-Sensor-Arbeitszimmer"
    password: !secret co2_ap_password

captive_portal:

uart:
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600

sensor:
  - platform: mhz19
    id: mhz19_arbeitszimmer
    co2:
      name: MH-Z19 CO2 Value
    temperature:
      name: MH-Z19 Temperature
    