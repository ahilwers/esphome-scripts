# ============================================================
# ESPHome Package: Garage Door Controller (single door)
#
# Required variables (provide via 'vars' in the !include block):
#   door_id           - Unique ID without spaces,  e.g. garage01
#   door_name         - Display name,              e.g. "Garage 01"
#   relay_pin         - GPIO pin of the relay,     e.g. GPIO21
#   open_sensor_pin   - GPIO pin for open limit,   e.g. GPIO17
#   closed_sensor_pin - GPIO pin for closed limit, e.g. GPIO18
#
# State logic (entirely driven by limit switches, not the relay):
#   closed_sensor releases → door is leaving closed position → OPENING
#   open_sensor   releases → door is leaving open position   → CLOSING
#   open_sensor   closes   → door reached open position      → OPEN / IDLE
#   closed_sensor closes   → door reached closed position    → CLOSED / IDLE
#   timeout after 25 s     → motion stalled, assumed OPEN    → OPEN / IDLE
# ============================================================

globals:
  - id: ${door_id}_moving
    type: bool
    restore_value: no
    initial_value: "false"

  - id: ${door_id}_last_direction
    type: int
    restore_value: no
    initial_value: "0"
    #  1 = opening
    # -1 = closing
    #  0 = idle / unknown

# ---------------------------------------------------------------------------
# Relay – sends a short pulse to trigger the door motor
# ---------------------------------------------------------------------------
switch:
  - platform: gpio
    pin:
      number: ${relay_pin}
      inverted: true
    id: ${door_id}_relay
    internal: true

# ---------------------------------------------------------------------------
# Scripts
# ---------------------------------------------------------------------------
script:
  # Triggers the motor: closes the relay for 500 ms, then releases it
  - id: ${door_id}_pulse
    mode: single
    then:
      - switch.turn_on: ${door_id}_relay
      - delay: 500ms
      - switch.turn_off: ${door_id}_relay

  # Safety fallback: if the door has not reached an end position within 25 s,
  # assume it is stuck in an unknown position and reset the moving state.
  - id: ${door_id}_motion_timeout
    mode: restart
    then:
      - delay: 25s
      - if:
          condition:
            lambda: "return id(${door_id}_moving);"
          then:
            - lambda: |-
                id(${door_id}_moving) = false;
                id(${door_id}_last_direction) = 0;
            - cover.template.publish:
                id: ${door_id}_cover
                state: OPEN
                current_operation: IDLE

# ---------------------------------------------------------------------------
# Limit switches
# ---------------------------------------------------------------------------
binary_sensor:
  # Open limit switch — active (pressed) when the door is fully open
  - platform: gpio
    id: ${door_id}_open_sensor
    internal: true
    pin:
      number: ${open_sensor_pin}
      inverted: true
      mode:
        input: true
        pullup: true
    name: "${door_name} geöffnet"
    icon: "mdi:garage-open"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

    # Door has reached the fully open position
    on_press:
      - script.stop: ${door_id}_motion_timeout
      - lambda: |-
          id(${door_id}_moving) = false;
          id(${door_id}_last_direction) = 0;
      - cover.template.publish:
          id: ${door_id}_cover
          state: OPEN
          current_operation: IDLE

    # Door is leaving the open position → it must be closing
    on_release:
      - lambda: |-
          id(${door_id}_moving) = true;
          id(${door_id}_last_direction) = -1;
      - cover.template.publish:
          id: ${door_id}_cover
          current_operation: CLOSING
      - script.execute: ${door_id}_motion_timeout

  # Closed limit switch — active (pressed) when the door is fully closed
  - platform: gpio
    id: ${door_id}_closed_sensor
    internal: true
    pin:
      number: ${closed_sensor_pin}
      inverted: true
      mode:
        input: true
        pullup: true
    name: "${door_name} geschlossen"
    icon: "mdi:garage"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms

    # Door has reached the fully closed position
    on_press:
      - script.stop: ${door_id}_motion_timeout
      - lambda: |-
          id(${door_id}_moving) = false;
          id(${door_id}_last_direction) = 0;
      - cover.template.publish:
          id: ${door_id}_cover
          state: CLOSED
          current_operation: IDLE

    # Door is leaving the closed position → it must be opening
    on_release:
      - lambda: |-
          id(${door_id}_moving) = true;
          id(${door_id}_last_direction) = 1;
      - cover.template.publish:
          id: ${door_id}_cover
          current_operation: OPENING
      - script.execute: ${door_id}_motion_timeout

  # Problem sensor: active when both contacts are open and the door is idle
  # (door stuck somewhere in between)
  - platform: template
    id: ${door_id}_jammed
    name: "${door_name} nicht in Endlage"
    device_class: problem
    lambda: |-
      if (!id(${door_id}_open_sensor).state &&
          !id(${door_id}_closed_sensor).state &&
          !id(${door_id}_moving))
        return true;
      return false;

# ---------------------------------------------------------------------------
# Cover entity (exposed to Home Assistant)
# ---------------------------------------------------------------------------
cover:
  - platform: template
    id: ${door_id}_cover
    name: "${door_name} Tor"
    device_class: garage
    assumed_state: true

    # Report current position based on limit switches
    lambda: |-
      if (id(${door_id}_open_sensor).state)   return COVER_OPEN;
      if (id(${door_id}_closed_sensor).state) return COVER_CLOSED;
      return {};

    # Relay actions only send the pulse — state tracking is done by the
    # limit switch events above, so no state changes happen here.
    open_action:
      - if:
          condition:
            # Only fire if the door is not already open or in the process of opening
            lambda: "return !id(${door_id}_moving) && !id(${door_id}_open_sensor).state;"
          then:
            - script.execute: ${door_id}_pulse

    close_action:
      - if:
          condition:
            # Only fire if the door is not already closed or in the process of closing
            lambda: "return !id(${door_id}_moving) && !id(${door_id}_closed_sensor).state;"
          then:
            - script.execute: ${door_id}_pulse

    stop_action:
      - if:
          condition:
            lambda: "return id(${door_id}_moving);"
          then:
            - script.execute: ${door_id}_pulse
            - script.stop: ${door_id}_motion_timeout
            - lambda: |-
                id(${door_id}_moving) = false;
                id(${door_id}_last_direction) = 0;
            - cover.template.publish:
                id: ${door_id}_cover
                current_operation: IDLE
